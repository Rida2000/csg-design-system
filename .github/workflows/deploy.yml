name: Build and Deploy Design System Site

on:
  push:
    branches: [main]
    paths:
      - 'DESIGN.md'
      - 'scripts/build.js'
      - 'assets/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Commit updated docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to docs/ — skipping commit"
          else
            git commit -m "chore: rebuild docs from DESIGN.md [skip ci]"
            git push
          fi
